<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TurfPro offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #ffffff; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
      .card { max-width: 560px; padding: 3rem 2rem; border: 1px solid #e5e7eb; border-radius: 24px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 13px rgba(0, 0, 0, 0.06); background: #ffffff; }
      .icon { font-size: 4rem; margin-bottom: 1.5rem; }
      h1 { margin: 0 0 1rem; font-size: clamp(1.5rem, 5vw, 2.5rem); color: #1a1a1a; font-weight: 600; }
      p { margin: 0 0 1.5rem; color: #6b7280; font-size: 1rem; line-height: 1.6; }
      a { display: inline-block; color: #ffffff; background: #2563eb; text-decoration: none; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; margin-top: 1rem; transition: background 0.3s ease; }
      a:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>TurfPro is not connected to the internet right now. Your bookings and data are safely saved locally and will sync when your connection is restored.</p>
      <p><a href="/">Return to home</a></p>
    </div>
  </body>
</html>
